name: CI

on:
  push:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  ci:
    runs-on: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint:ci

      - name: Test
        run: bun test

      - name: Compute release version
        run: echo "ICAL_VERSION=$(date -u +'%Y.%m.%d').${GITHUB_RUN_NUMBER}" >> "$GITHUB_ENV"

      - name: Build
        run: bun run build

      - name: Publish release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "$ICAL_VERSION" >/dev/null 2>&1; then
            gh release upload "$ICAL_VERSION" out/ical --clobber
            gh release edit "$ICAL_VERSION" --title "$ICAL_VERSION"
          else
            gh release create "$ICAL_VERSION" out/ical --title "$ICAL_VERSION" --notes ""
          fi
